# ──────────────────────────────────────────────────────────────────────────────
#  Local development stack for the Recovery & Sports Therapy Platform.
#  All services share one bridge network and store data in named volumes so that
#  `docker compose down` is non-destructive.  For production overrides see
#  docker-compose.prod.yml.
# ──────────────────────────────────────────────────────────────────────────────
name: recovery-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: recovery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [recovery-net]

  redis:
    image: redis:7-alpine
    container_name: recovery-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [recovery-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recovery-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES}
      APP_JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
      APP_JWT_ISSUER: ${JWT_ISSUER}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks: [recovery-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${FRONTEND_API_BASE_URL}
    container_name: recovery-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [recovery-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: recovery-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks: [recovery-net]

networks:
  recovery-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
